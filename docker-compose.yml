version: '3.8'

# Local Postgres is optional — use Supabase by setting DATABASE_URL in server/.env
# and starting only api + redis:  docker compose up api redis
# For local Postgres:             docker compose --profile local-db up

services:
  # PostgreSQL Database (pgvector) — profile local-db; skip when using Supabase
  db:
    profiles: ["local-db"]
    image: pgvector/pgvector:pg15
    container_name: upsc_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: upsc_hindi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Caching and Leaderboards
  redis:
    image: redis:7-alpine
    container_name: upsc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # pgAdmin for local PostgreSQL only
  pgadmin:
    profiles: ["local-db"]
    image: dpage/pgadmin4:latest
    container_name: upsc_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # FastAPI Backend — DATABASE_URL comes from server/.env (Supabase or local)
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: upsc_api
    ports:
      - "8000:8000"
    env_file: ./server/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app
    restart: unless-stopped

  

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
