version: '3.8'

# See root docker-compose.yml for Supabase vs local-db profile notes.

services:
  db:
    profiles: ["local-db"]
    image: pgvector/pgvector:pg15
    container_name: upsc_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: upsc_hindi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d upsc_hindi"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: upsc_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: upsc_api
    restart: on-failure
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      # Set to "1" to seed demo accounts on first run (disabled by default)
      SEED_DEMO_DATA: "0"
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  pgadmin:
    profiles: ["local-db"]
    image: dpage/pgadmin4
    container_name: upsc_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
