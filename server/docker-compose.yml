version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: upsc_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: upsc_hindi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: upsc_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: upsc_api
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/upsc_hindi
      REDIS_URL: redis://redis:6379/0
      # Creates priya@demo.drishti.dev / Demo123! (etc.) on first startup only
      SEED_DEMO_DATA: "1"
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  pgadmin:
    image: dpage/pgadmin4
    container_name: upsc_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
